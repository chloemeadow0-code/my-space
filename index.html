<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属陪伴空间</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#f43f5e', secondary: '#fb7185', bglight: '#fff1f2' } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        body { background-color: var(--tg-theme-bg-color, #fff1f2); color: var(--tg-theme-text-color, #1f2937); }
        
        .pixel-font { font-family: 'DotGothic16', monospace; }
        .pixel-box { border: 4px solid #374151; box-shadow: 4px 4px 0px #9ca3af; background-color: #f3f4f6; }
        .pixel-btn { border: 3px solid #1f2937; background-color: white; box-shadow: 3px 3px 0px #1f2937; transition: all 0.1s; }
        .pixel-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #1f2937; }
        .pixel-screen { background-color: #c2d5aa; border: inset 4px #9ca3af; color: #111827; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden font-sans selection:bg-primary selection:text-white">

<div id="app" class="h-full w-full relative flex flex-col bg-gradient-to-br from-bglight via-white to-pink-50">

    <transition name="fade">
        <div v-if="!isAuthenticated" class="absolute inset-0 z-[100] bg-white/90 backdrop-blur flex flex-col items-center justify-center p-6">
            <div class="w-24 h-24 bg-white rounded-full shadow-lg flex items-center justify-center mb-8 border-4 border-white text-4xl">🔐</div>
            <h2 class="text-xl font-bold mb-2">连接专属终端</h2>
            <div class="w-full max-w-sm space-y-4 mt-6">
                <input v-model="inputSecret" type="password" placeholder="输入密钥..." class="w-full bg-white h-12 rounded-2xl px-5 outline-none focus:ring-2 focus:ring-primary/50 shadow-sm border border-gray-100 text-center tracking-widest">
                <button @click="verifySecret" class="w-full h-12 bg-primary text-white rounded-2xl font-bold shadow-md active:scale-95 transition-all">激活</button>
            </div>
        </div>
    </transition>

    <template v-if="isAuthenticated">
        <header class="h-14 flex items-center px-4 shrink-0 z-20 relative bg-white/40 backdrop-blur-sm border-b border-white/50">
            <button @click="isMenuOpen = true" class="p-2 -ml-2 text-gray-600 hover:text-primary transition-colors active:scale-95">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="15" y2="18"></line></svg>
            </button>
            <h1 class="ml-3 text-base font-semibold tracking-wide text-gray-800">{{ tabs[currentTab].title }}</h1>
        </header>

        <transition name="fade">
            <div v-if="isMenuOpen" @click="isMenuOpen = false" class="fixed inset-0 bg-black/20 backdrop-blur-[2px] z-40"></div>
        </transition>
        <aside :class="isMenuOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed top-0 left-0 h-full w-64 bg-white/95 backdrop-blur-xl shadow-2xl z-50 transition-transform duration-300 ease-out flex flex-col">
            <div class="h-14 flex items-center px-4 border-b border-gray-100 shrink-0"><span class="ml-3 font-semibold text-gray-800">模块切换</span></div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button v-for="(tab, key) in tabs" :key="key" @click="switchTab(key)" :class="currentTab === key ? 'bg-primary/10 text-primary font-bold' : 'text-gray-500 hover:bg-gray-50 font-medium'" class="w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl transition-all">
                    <div v-html="tab.svg" class="w-5 h-5"></div>
                    <span>{{ tab.name }}</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 relative w-full h-full">
            <transition name="fade" mode="out-in">

                <div v-if="currentTab === 'pet'" class="h-full flex flex-col items-center justify-center absolute inset-0 p-5 pb-safe pixel-font bg-[#ffe4e6]">
                    <div class="w-full max-w-sm pixel-box pixel-screen p-4 mb-6 relative">
                        <div class="text-center text-4xl mb-4 mt-2">🐣</div>
                        <div class="h-24 overflow-y-auto text-sm leading-relaxed border-t-2 border-dashed border-gray-500 pt-2">
                            <p class="whitespace-pre-wrap">{{ petStatusMsg }}</p>
                        </div>
                        <div class="absolute top-2 right-2 flex space-x-1">
                            <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                            <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4 w-full max-w-sm mt-2">
                        <button @click="interactPet('feed')" class="pixel-btn p-3 flex flex-col items-center justify-center font-bold text-gray-700">
                            <span class="text-2xl mb-1">🍙</span><span>FEED</span>
                        </button>
                        <button @click="interactPet('clean')" class="pixel-btn p-3 flex flex-col items-center justify-center font-bold text-gray-700">
                            <span class="text-2xl mb-1">🚿</span><span>CLEAN</span>
                        </button>
                        <button @click="interactPet('play')" class="pixel-btn p-3 flex flex-col items-center justify-center font-bold text-gray-700">
                            <span class="text-2xl mb-1">🎮</span><span>PLAY</span>
                        </button>
                    </div>
                </div>

                <div v-else-if="currentTab === 'memory'" class="h-full flex flex-col absolute inset-0 pb-safe">
                    <div class="px-4 pt-3 pb-2 bg-white/60 backdrop-blur-md shadow-sm shrink-0 z-10 flex justify-between items-center transition-all">
                        <div class="flex space-x-2 overflow-x-auto pb-1 scrollbar-hide flex-1">
                            <button v-for="cat in ['全部', '情感', '记事', '灵感', '流水', '画像']" @click="filterCat = cat"
                                :class="filterCat === cat ? 'bg-primary text-white' : 'bg-white text-gray-500 border border-gray-100'"
                                class="px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap shadow-sm transition-colors">{{ cat }}</button>
                        </div>
                        <button @click="toggleManage" class="ml-3 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm transition-all"
                                :class="isManageMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 border border-gray-200'">
                            {{ isManageMode ? '退出管理' : '⚙️ 管理' }}
                        </button>
                    </div>
                    
                    <div v-if="!isManageMode" class="px-4 pb-2 pt-1 flex justify-between items-center bg-white/60 backdrop-blur-md z-10 shrink-0">
                        <select v-model="filterTime" class="bg-transparent text-xs text-gray-600 font-medium outline-none">
                            <option value="all">全部时间</option>
                            <option value="week">最近一周</option>
                            <option value="month">最近一月</option>
                        </select>
                        <span class="text-xs text-gray-400 font-medium">共 {{ filteredMemories.length }} 条</span>
                    </div>

                    <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4" :class="{'pb-24': isManageMode}">
                        <div v-if="filteredMemories.length === 0" class="text-center text-gray-400 mt-10 text-sm">空空如也~</div>
                        
                        <div v-for="mem in filteredMemories" :key="mem.id" 
                             @click="isManageMode ? toggleSelect(mem.id) : null"
                             class="bg-white/80 p-4 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.02)] relative transition-all duration-200"
                             :class="[isManageMode ? 'cursor-pointer' : '', isManageMode && selectedIds.includes(mem.id) ? 'border-2 border-primary ring-4 ring-primary/10 bg-pink-50' : 'border border-white']">
                            
                            <div v-if="isManageMode" class="absolute right-4 top-4">
                                <div class="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors"
                                     :class="selectedIds.includes(mem.id) ? 'bg-primary border-primary' : 'border-gray-300 bg-white'">
                                    <svg v-if="selectedIds.includes(mem.id)" class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>

                            <div class="flex justify-between items-center mb-2 pr-6">
                                <span class="text-[10px] font-bold text-primary px-2 py-0.5 bg-primary/10 rounded-lg">{{ mem.category || '未分类' }}</span>
                                <span class="text-[10px] text-gray-400">{{ formatTime(mem.created_at) }}</span>
                            </div>
                            <h3 class="font-bold text-gray-800 text-[15px] mb-1.5">{{ mem.title }}</h3>
                            <p class="text-[13px] text-gray-600 leading-relaxed">{{ mem.content }}</p>
                        </div>
                    </div>

                    <transition name="fade">
                        <div v-if="isManageMode" class="absolute bottom-0 left-0 w-full bg-white/95 backdrop-blur-xl border-t border-gray-100 p-4 pb-safe z-30 flex justify-between items-center space-x-3 shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
                            <button @click="scanDuplicates" class="flex-1 bg-blue-50 text-blue-600 font-bold py-3 rounded-2xl active:scale-95 transition-transform flex items-center justify-center border border-blue-100">
                                <span>🔍 智能查重</span>
                            </button>
                            <button @click="deleteSelected" :disabled="selectedIds.length === 0" 
                                    class="flex-1 font-bold py-3 rounded-2xl transition-all flex items-center justify-center"
                                    :class="selectedIds.length > 0 ? 'bg-red-500 text-white active:scale-95 shadow-md shadow-red-200' : 'bg-gray-100 text-gray-400'">
                                <span>🗑️ 清除 ({{ selectedIds.length }})</span>
                            </button>
                        </div>
                    </transition>
                </div>

                <div v-else-if="currentTab === 'dashboard'" class="h-full flex flex-col absolute inset-0 pb-safe">
                    <div class="flex-1 overflow-y-auto p-4">
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-white/90 p-4 rounded-3xl shadow-sm border border-white">
                                <div class="text-2xl mb-1">🔋</div>
                                <h3 class="text-xs text-gray-400 font-medium">设备状态</h3>
                                <p class="font-bold text-gray-700 mt-0.5 truncate">{{ dashData.battery }}</p>
                            </div>
                            <div class="bg-gradient-to-br from-primary to-secondary p-4 rounded-3xl shadow-md text-white">
                                <div class="text-2xl mb-1">💰</div>
                                <h3 class="text-xs text-white/80 font-medium">本月开销总计</h3>
                                <p class="font-bold text-lg mt-0.5">¥ {{ dashData.expense }}</p>
                            </div>
                            <div class="col-span-2 bg-white/90 p-4 rounded-3xl shadow-sm border border-white flex items-center justify-between">
                                <div class="w-full pr-2">
                                    <div class="text-xs text-gray-400 font-medium mb-1 flex items-center">📍 查岗定位</div>
                                    <p class="font-bold text-gray-700 text-sm leading-snug">{{ dashData.location }}</p>
                                </div>
                            </div>
                        </div>

                        <h3 class="text-sm font-bold text-gray-800 mb-3 px-1">💸 本月开销明细</h3>
                        <div class="bg-white/80 rounded-3xl shadow-sm border border-white overflow-hidden p-2">
                            <div v-if="dashData.records.length === 0" class="text-center text-gray-400 text-xs py-6">本月还没有记账哦</div>
                            <div v-for="(rec, idx) in dashData.records" :key="idx" class="flex items-center justify-between p-3 border-b border-gray-50 last:border-0">
                                <div class="flex items-center space-x-3">
                                    <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs shadow-inner">
                                        {{ rec.type === '餐饮' ? '🍔' : (rec.type === '购物' ? '🛍️' : '💳') }}
                                    </div>
                                    <div>
                                        <p class="text-sm font-bold text-gray-700">{{ rec.item }}</p>
                                        <p class="text-[10px] text-gray-400">{{ rec.date }} | {{ rec.type }}</p>
                                    </div>
                                </div>
                                <span class="font-bold text-gray-800 text-sm">-{{ rec.amount }}</span>
                            </div>
                        </div>
                    </div>
                </div>

            </transition>
        </main>
    </template>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue

    // ==========================================
    // ⚠️ 填入你的 Render 网址
    // ==========================================
    const API_BASE_URL = 'https://mcp-gateway-w9yh.onrender.com';

    createApp({
        setup() {
            const tg = window.Telegram.WebApp;
            tg.expand(); 

            const inputSecret = ref('')
            const savedSecret = localStorage.getItem('space_api_secret')
            const isAuthenticated = ref(!!savedSecret)
            const apiSecret = ref(savedSecret || '')

            const currentTab = ref('pet')
            const isMenuOpen = ref(false)
            
            const tabs = {
                pet: { name: '像素宠物屋', title: 'TAMAGOTCHI', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>' },
                memory: { name: '记忆星空', title: '我们的记忆', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>' },
                dashboard: { name: '管家控制台', title: '状态控制台', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>' }
            }

            const verifySecret = () => {
                if (!inputSecret.value.trim()) return
                const secret = inputSecret.value.trim()
                localStorage.setItem('space_api_secret', secret)
                apiSecret.value = secret
                isAuthenticated.value = true
                interactPet('get')
            }

            // --- 宠物模块 ---
            const petStatusMsg = ref('>>> SYSTEM BOOTING...\n>>> WAITING FOR CONNECTION...')
            const interactPet = async (actionStr) => {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                petStatusMsg.value = `>>> EXECUTING [${actionStr.toUpperCase()}]...\n>>> PLEASE WAIT...`
                try {
                    const res = await fetch(`${API_BASE_URL}/api/pet`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiSecret.value}` },
                        body: JSON.stringify({ action: actionStr })
                    })
                    const data = await res.json()
                    petStatusMsg.value = `>>> SYS_RESPONSE:\n${data.message || 'SUCCESS!'}`
                } catch (e) { petStatusMsg.value = '>>> ERR: CONNECTION FAILED' }
            }

            // --- 记忆管理模块 ---
            const memoryList = ref([])
            const filterCat = ref('全部')
            const filterTime = ref('all') 
            
            // 管理模式状态
            const isManageMode = ref(false)
            const selectedIds = ref([])

            const loadMemories = async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/memories/all`, { headers: { 'Authorization': `Bearer ${apiSecret.value}` } })
                    if (res.ok) memoryList.value = await res.json()
                } catch (e) { console.error(e) }
            }

            const filteredMemories = computed(() => {
                const now = new Date()
                return memoryList.value.filter(mem => {
                    if (filterCat.value !== '全部' && mem.category !== filterCat.value) return false
                    if (filterTime.value !== 'all') {
                        const mDate = new Date(mem.created_at)
                        const diffDays = (now - mDate) / (1000 * 60 * 60 * 24)
                        if (filterTime.value === 'week' && diffDays > 7) return false
                        if (filterTime.value === 'month' && diffDays > 30) return false
                    }
                    return true
                })
            })

            const formatTime = (iso) => {
                if(!iso) return ''; const d = new Date(iso);
                return `${d.getMonth()+1}-${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
            }

            const toggleManage = () => {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                isManageMode.value = !isManageMode.value;
                if (!isManageMode.value) selectedIds.value = [];
            }

            const toggleSelect = (id) => {
                if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                const idx = selectedIds.value.indexOf(id);
                if (idx > -1) selectedIds.value.splice(idx, 1);
                else selectedIds.value.push(id);
            }

            // 文本相似度算法 (Dice系数，适合中文短文本)
            const getBigrams = (str) => {
                const bg = new Set();
                for(let i=0; i<str.length-1; i++) bg.add(str.slice(i, i+2));
                return bg;
            }
            const calcSim = (s1, s2) => {
                if(s1 === s2) return 1;
                if(s1.length < 2 || s2.length < 2) return s1===s2 ? 1 : 0;
                let bg1 = getBigrams(s1), bg2 = getBigrams(s2);
                let intersection = 0;
                for (let bg of bg1) { if (bg2.has(bg)) intersection++; }
                return (2.0 * intersection) / (bg1.size + bg2.size);
            }

            // 智能查重核心逻辑
            const scanDuplicates = () => {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                let toDelete = new Set();
                // 确保按时间降序排列 (新的在前，旧的在后)
                let mems = [...filteredMemories.value].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

                for(let i=0; i<mems.length; i++) {
                    if(toDelete.has(mems[i].id)) continue; 
                    for(let j=i+1; j<mems.length; j++) {
                        if(toDelete.has(mems[j].id)) continue;
                        let sim = calcSim(mems[i].content || '', mems[j].content || '');
                        // 相似度 > 80% 即判定为冗余重复
                        if(sim > 0.8) {
                            toDelete.add(mems[j].id); // 自动标记较旧的一条
                        }
                    }
                }
                
                selectedIds.value = Array.from(toDelete);
                if(selectedIds.value.length > 0) {
                    if(tg.showAlert) tg.showAlert(`扫描完毕！在当前列表中发现 ${selectedIds.value.length} 条高度相似的冗余旧记忆，已为您自动勾选。请核对后清除。`);
                    else alert(`扫描完毕！发现 ${selectedIds.value.length} 条重复旧记忆。`);
                } else {
                    if(tg.showAlert) tg.showAlert('扫描完毕！当前列表中没有发现相似冗余内容。');
                    else alert('没有发现重复冗余内容哦。');
                }
            }

            // 删除执行逻辑
            const deleteSelected = () => {
                if(selectedIds.value.length === 0) return;
                
                const executeDelete = async () => {
                    try {
                        if (tg.platform !== 'unknown' && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                        const res = await fetch(`${API_BASE_URL}/api/memories/delete`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiSecret.value}` },
                            body: JSON.stringify({ ids: selectedIds.value })
                        });
                        if(res.ok) {
                            alert(`✅ 成功清除 ${selectedIds.value.length} 条记忆！`);
                            selectedIds.value = [];
                            isManageMode.value = false;
                            loadMemories(); // 重新拉取最新数据
                        } else {
                            alert(`❌ 删除失败，服务器状态码: ${res.status}`);
                        }
                    } catch(e) {
                        alert(`❌ 网络请求失败: ${e.message}`);
                    }
                }

                // 核心修复：判断是否在真实的 Telegram App 环境内。
                // 如果是“添加到主屏幕”的浏览器网页，tg.platform 会是 'unknown'，此时 TG 弹窗会失效，必须强行拦截并使用原生 confirm
                if (tg.platform !== 'unknown' && tg.showConfirm) {
                    tg.showConfirm(`危险操作：确定要永久清除这 ${selectedIds.value.length} 条记忆吗？`, (confirmed) => {
                        if(confirmed) executeDelete();
                    });
                } else {
                    if(confirm(`危险操作：确定要永久清除这 ${selectedIds.value.length} 条记忆吗？`)) executeDelete();
                }
            }

            // --- 控制台模块 ---
            const dashData = ref({ location: '加载中...', battery: '加载中...', expense: '0', records: [] })
            const loadDashData = async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/dashboard`, { headers: { 'Authorization': `Bearer ${apiSecret.value}` } })
                    if (res.ok) dashData.value = await res.json()
                } catch (e) { console.error(e) }
            }

            const switchTab = (key) => {
                currentTab.value = key; setTimeout(() => { isMenuOpen.value = false }, 50)
                if (key === 'memory' && memoryList.value.length === 0) loadMemories()
                if (key === 'dashboard') loadDashData()
                if (key === 'pet' && petStatusMsg.value.includes('WAITING')) interactPet('get')
            }

            onMounted(() => { if (isAuthenticated.value) interactPet('get') })

            return {
                isAuthenticated, inputSecret, verifySecret,
                currentTab, isMenuOpen, tabs, switchTab,
                memoryList, filterCat, filterTime, filteredMemories, formatTime,
                isManageMode, selectedIds, toggleManage, toggleSelect, scanDuplicates, deleteSelected,
                interactPet, petStatusMsg, dashData
            }
        }
    }).mount('#app')
</script>
</body>
</html>
